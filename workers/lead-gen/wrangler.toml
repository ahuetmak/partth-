# B2B Lead Gen Worker — Apify, SerpApi, MillionVerifier, Resend, PayPal
name = "lead-gen"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
# Non-sensitive config; secrets via: wrangler secret put X
# APIFY_WEBHOOK_SECRET, SERPAPI_KEY, MILLION_VERIFIER_KEY, RESEND_API_KEY,
# PAYPAL_CLIENT_ID, PAYPAL_CLIENT_SECRET, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY

# Cron para procesar cola de leads (USE_QUEUE=true)
[triggers]
crons = ["*/5 * * * *"]
