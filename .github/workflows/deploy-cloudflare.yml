# Deploy Cloudflare Worker with static assets (GitHub → Cloudflare via Wrangler)
name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.API_CLOUDFLARE }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.ID_CUENTA_CLOUDFLARE }}
        run: npx wrangler deploy

      - name: Purge Cloudflare cache (partth.com)
        continue-on-error: true
        run: |
          if [ -n "${{ secrets.CLOUDFLARE_ZONE_ID }}" ]; then
            curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
              -H "Authorization: Bearer ${{ secrets.API_CLOUDFLARE }}" \
              -H "Content-Type: application/json" \
              --data '{"hosts":["partth.com"]}'
          fi
