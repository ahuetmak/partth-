# CRON: Ingest Dallas + Austin permits → raw_signals
name: Ingest Permits

on:
  schedule:
    - cron: "0 9 * * *"  # Diario 9:00 UTC
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install
        run: cd scripts/ingest-permits && npm install

      - name: Ingest
        env:
          SUPABASE_URL: https://ptfsjqsckjqamaiagidj.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: cd scripts/ingest-permits && npm run ingest
